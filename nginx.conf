# ═══════════════════════════════════════════════════════════════════════════════
# nginx config for GLB Animation Studio on Hugging Face Spaces
# Listening on port 7860 (HF Spaces requirement)
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 7860;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        model/gltf+json
        model/gltf-binary
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options     "nosniff"       always;
    add_header X-Frame-Options            "SAMEORIGIN"    always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # SharedArrayBuffer support (required for FFmpeg.wasm / WebCodecs)
    add_header Cross-Origin-Opener-Policy   "same-origin"  always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ── JavaScript / CSS / fonts — immutable cache ──────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy   "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Images
    location ~* \.(png|jpg|jpeg|svg|ico|webp|gif)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # GLB / GLTF / HDR / KTX2 3D assets
    location ~* \.(glb|gltf|bin|hdr|exr|ktx2)$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    # WebAssembly
    location ~* \.wasm$ {
        default_type application/wasm;
        expires 7d;
        add_header Cache-Control "public";
        add_header Cross-Origin-Opener-Policy   "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # ── SPA fallback — all routes go to index.html ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Cross-Origin-Opener-Policy   "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    error_page 404 /index.html;

    # Large GLB file upload support (up to 200 MB)
    client_max_body_size 200M;

    # Timeouts
    proxy_read_timeout     300s;
    proxy_connect_timeout  60s;
    send_timeout           300s;
}
