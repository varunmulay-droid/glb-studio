name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force redeploy'
        default: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "deploy@glbstudio.dev"
          git config user.name  "GLB Studio Deploy"
          git remote add space \
            "https://varunm2004:${HF_TOKEN}@huggingface.co/spaces/varunm2004/glb-studio" \
            2>/dev/null || true
          git push space main --force
          echo ""
          echo "🎉 Deployed → https://huggingface.co/spaces/varunm2004/glb-studio"
