name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "deploy@glbstudio.dev"
          git config user.name  "GLB Studio Deploy"
          git remote add hf-space \
            "https://varunm2004:${HF_TOKEN}@huggingface.co/spaces/varunm2004/glb-studio" \
            2>/dev/null || \
          git remote set-url hf-space \
            "https://varunm2004:${HF_TOKEN}@huggingface.co/spaces/varunm2004/glb-studio"
          git push hf-space main --force
          echo "✅ https://huggingface.co/spaces/varunm2004/glb-studio"
