name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "deploy@glbstudio.dev"
          git config user.name "GLB Studio Deploy"
          
          # Add HF remote with token auth
          git remote add hf-space https://varunm2004:${HF_TOKEN}@huggingface.co/spaces/varunm2004/glb-studio || \
          git remote set-url hf-space https://varunm2004:${HF_TOKEN}@huggingface.co/spaces/varunm2004/glb-studio
          
          # Push to HF Spaces main branch
          git push hf-space main --force

      - name: Report Space URL
        run: |
          echo "✅ Deployed to: https://huggingface.co/spaces/varunm2004/glb-studio"
