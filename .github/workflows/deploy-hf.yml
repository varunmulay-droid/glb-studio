name: Sync to HF Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ci@glbstudio.dev"
          git config user.name "GLB Studio CI"

          # Add HF as remote
          git remote add hf \
            "https://varunm2004:${HF_TOKEN}@huggingface.co/spaces/varunm2004/glb-studio" \
            2>/dev/null || \
          git remote set-url hf \
            "https://varunm2004:${HF_TOKEN}@huggingface.co/spaces/varunm2004/glb-studio"

          # Verify dist/ exists in our repo
          ls -la dist/assets/ || (echo "ERROR: dist/ missing!" && exit 1)
          echo "dist/ files:"
          ls dist/assets/

          # Force push our entire repo to HF
          git push hf HEAD:main --force
          echo "✅ Pushed to HF Spaces"
